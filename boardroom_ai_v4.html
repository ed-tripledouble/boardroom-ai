    for(let i=0;i<t.members.length;i++){
      if(!S.running)break;const m=t.members[i];
      sb.innerHTML=`⏳ ${m.emoji} ${m.title} (${i+1}/${t.members.length}) <button class="stop-btn" onclick="stop()">Стоп</button>`;
      document.querySelectorAll('.member-chip').forEach(c=>c.classList.remove('speaking','done'));
      const ch=document.getElementById(`chip-${m.id}`);if(ch)ch.classList.add('speaking');
      for(let j=0;j<i;j++){const pc=document.getElementById(`chip-${t.members[j].id}`);if(pc)pc.classList.add('done')}
      showTyp(m);
      try{
        const prev=resps.length?resps.map(r=>`[${r.title}]: ${r.text}`).join('\n\n'):'';
        const usr=prev?`Previous opinions:\n${prev}\n\n---\nYour turn. Question: ${fullQ}`:`Question: ${fullQ}`;
        const drill=isBoard?DRILL_INSTRUCTION:'';
        const text=await call(m.model,GLOBAL_RULES+'\n'+m.prompt+drill,usr);
        let clean=text,drillMatch=null;
        if(isBoard){const rx=/\[DRILL:(\w+):(.+)\]\s*$/;drillMatch=text.match(rx);if(drillMatch)clean=text.replace(rx,'').trim()}
        resps.push({id:m.id,title:m.title,text:clean,emoji:m.emoji,color:m.color});
        rmTyp();c.push({role:'board',memberId:m.id,title:m.title,text:clean,model:m.model,emoji:m.emoji,color:m.color});renderMsgs();
        if(drillMatch&&TEAMS[drillMatch[1]]){
          const dtid=drillMatch[1],dq=drillMatch[2],dt=TEAMS[dtid];
          sb.innerHTML=`🔍 ${dt.emoji} ${dt.name}... <button class="stop-btn" onclick="stop()">Стоп</button>`;
          const dr=[];
          for(const dm of dt.members){if(!S.running)break;showTyp(dm);
            try{const dp=dr.length?dr.map(r=>`[${r.title}]: ${r.text}`).join('\n\n'):'';const du=dp?`Previous:\n${dp}\n\n---\nQuestion: ${dq}${ctx}`:`Question: ${dq}${ctx}`;const dt2=await call(dm.model,GLOBAL_RULES+'\n'+dm.prompt,du);dr.push({title:dm.title,text:dt2,emoji:dm.emoji,color:dm.color,model:dm.model})}
            catch(e){dr.push({title:dm.title,text:`⚠️ ${e.message}`,emoji:dm.emoji,color:dm.color,model:dm.model})}
            rmTyp()}
          c.push({role:'drill',teamName:`${dt.emoji} ${dt.name}`,question:dq,responses:dr});
          resps.push({id:'drill_'+dtid,title:`Результат: ${dt.name}`,text:dr.map(r=>`${r.title}: ${r.text}`).join('\n')});
          renderMsgs()
        }
      }catch(e){rmTyp();if(e.name==='AbortError')break;c.push({role:'board',memberId:m.id,title:m.title,text:`⚠️ ${e.message}`,model:m.model,emoji:m.emoji,color:m.color});renderMsgs()}
    }
    if(isBoard&&S.running&&resps.length>0){
      sb.innerHTML=`📋 Протокол... <button class="stop-btn" onclick="stop()">Стоп</button>`;
      const sc=document.getElementById('chip-synth');if(sc)sc.classList.add('speaking');
      showTyp({emoji:'📋',title:'Протокол',color:'var(--accent-gold)',model:'claude-sonnet'});
      try{const all=resps.map(r=>`[${r.title}]: ${r.text}`).join('\n\n');const sm=`Question: "${q}"\nContext: ${p.context||'N/A'}\n\nAll opinions:\n${all}\n\nCreate the protocol in Russian.`;const st=await call('anthropic/claude-sonnet-4-20250514',GLOBAL_RULES+'\n'+SYNTH_PROMPT,sm);rmTyp();c.push({role:'board',memberId:'synth',title:'Итоговый протокол',text:st,model:'claude-sonnet',emoji:'📋',color:'var(--accent-gold)'})}
      catch(e){rmTyp();if(e.name!=='AbortError')c.push({role:'board',memberId:'synth',title:'Протокол',text:`⚠️ ${e.message}`,emoji:'📋',color:'var(--accent-gold)'})}
      renderMsgs()
    }
  }finally{S.running=false;S.abort=null;sb.classList.remove('active');document.getElementById('sendBtn').disabled=false;document.querySelectorAll('.member-chip').forEach(c=>c.classList.remove('speaking','done'));save()}
}
function showTyp(m){const a=document.getElementById('chatArea'),e=document.createElement('div');e.id='typ';e.className='message message-board';e.style=`--member-color:${m.color}`;e.innerHTML=`<div class="message-board-header" style="border-left-color:${m.color}"><div class="member-avatar" style="background:${m.color}">${m.emoji}</div><div class="member-info"><div class="member-title">${m.title}</div></div></div><div class="message-board-body"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;a.appendChild(e);a.scrollTop=a.scrollHeight}
function rmTyp(){document.getElementById('typ')?.remove()}
function stop(){S.running=false;S.abort?.abort()}

// ============ MODALS ============
function newProjModal(){
  const o=document.createElement('div');o.className='modal-overlay';o.onclick=e=>{if(e.target===o)o.remove()};
  o.innerHTML=`<div class="modal"><h2>Новый проект</h2><p>Контекст — это вся информация, которую директора должны знать: что за бизнес, цифры, история, текущая ситуация. Чем подробнее, тем лучше ответы.</p><label>Название</label><input id="npN" placeholder="Например: Франшиза автомоек"><label>Описание (кратко)</label><input id="npD" placeholder="В 2-3 словах"><label>Контекст проекта</label><textarea id="npC" rows="8" placeholder="Опишите бизнес подробно: что делаете, какие цифры, какие проблемы, что уже пробовали, какие планы..."></textarea><div class="ctx-note">Чем больше контекста — тем точнее советы. Можно дополнить позже через кнопку «📝 Контекст»</div><div class="modal-actions"><button class="btn" onclick="this.closest('.modal-overlay').remove()">Отмена</button><button class="btn btn-primary" onclick="createProj()">Создать</button></div></div>`;
  document.body.appendChild(o);document.getElementById('npN').focus()
}
function createProj(){
  const n=document.getElementById('npN').value.trim(),d=document.getElementById('npD').value.trim(),c=document.getElementById('npC').value.trim();
  if(!n)return;const p={id:'p_'+Date.now(),name:n,desc:d,context:c,chats:{}};S.projects.push(p);save();renderSB();selTeam(p.id,'board');document.querySelector('.modal-overlay')?.remove()
}
function editProjectContext(){
  const p=gP();if(!p)return;
  const o=document.createElement('div');o.className='modal-overlay';o.onclick=e=>{if(e.target===o)o.remove()};
  o.innerHTML=`<div class="modal"><h2>📝 Контекст: ${esc(p.name)}</h2><p>Эту информацию получают все директора и эксперты с каждым вопросом. Добавляйте цифры, факты, историю решений.</p><textarea id="editCtx" rows="12" style="font-family:inherit">${esc(p.context||'')}</textarea><div class="modal-actions"><button class="btn" onclick="this.closest('.modal-overlay').remove()">Отмена</button><button class="btn btn-primary" onclick="saveCtx()">Сохранить</button></div></div>`;
  document.body.appendChild(o)
}
function saveCtx(){const p=gP();if(!p)return;p.context=document.getElementById('editCtx').value;save();document.querySelector('.modal-overlay')?.remove()}
function showSettingsModal(){
  const o=document.createElement('div');o.className='modal-overlay';o.onclick=e=>{if(e.target===o)o.remove()};
  o.innerHTML=`<div class="modal"><h2>API</h2><p>Ключ хранится только в браузере.</p><label>OpenRouter API Key</label><input type="password" id="akI" value="${S.apiKey}" placeholder="sk-or-v1-..."><div class="modal-actions"><button class="btn" onclick="this.closest('.modal-overlay').remove()">Отмена</button><button class="btn btn-primary" onclick="saveK()">Сохранить</button></div></div>`;
  document.body.appendChild(o)
}
function saveK(){S.apiKey=document.getElementById('akI').value.trim();localStorage.setItem('openrouter_key',S.apiKey);document.querySelector('.modal-overlay')?.remove()}
function showInfoModal(){
  const o=document.createElement('div');o.className='modal-overlay';o.onclick=e=>{if(e.target===o)o.remove()};
  const tl=Object.entries(TEAMS).map(([k,t])=>`<div class="info-card"><div class="info-card-emoji">${t.emoji}</div><div><div class="info-card-name">${t.name}</div><div class="info-card-role">${t.members.length} экспертов${k==='board'?' + протокол':''}</div></div></div>`).join('');
  o.innerHTML=`<div class="modal modal-wide"><h2>🏛️ BoardRoom AI v3</h2>
    <div class="info-section-title">Как работает</div><ul class="info-how-list"><li>Проект → команда → вопрос</li><li>Совет директоров: 11 человек + итоговый протокол</li><li>9 экспертных команд для глубокого погружения</li><li>Директора сами запрашивают экспертов при необходимости</li><li>Вы можете зайти в любую команду напрямую</li><li>Жёсткий реалистичный тон — без воды и лести</li><li>Кнопка «📝 Контекст» — добавляйте данные бизнеса</li></ul>
    <div class="info-section-title">Модели</div><p style="font-size:11px;color:var(--text-muted)"><span class="info-card-model-tag tag-claude">Claude Sonnet</span> аналитика, логика <span class="info-card-model-tag tag-gpt">GPT-4o</span> креатив, идеи <span class="info-card-model-tag tag-perplexity">Perplexity</span> свежие данные</p>
    <div class="info-section-title">Команды (${Object.values(TEAMS).reduce((a,t)=>a+t.members.length,0)} экспертов)</div><div class="info-grid">${tl}</div>
    <div class="modal-actions"><button class="btn btn-primary" onclick="this.closest('.modal-overlay').remove()">Понятно</button></div></div>`;
  document.body.appendChild(o)
}
function exportSession(){
  const p=gP(),c=gC(),t=gT();if(!p||!c)return;
  const txt=c.map(m=>{if(m.role==='user')return`\n📌 ВОПРОС:\n${m.text}\n`;if(m.role==='drill')return`\n🔍 УГЛУБЛЕНИЕ: ${m.teamName}\nВопрос: ${m.question}\n${(m.responses||[]).map(r=>`${r.emoji} ${r.title}:\n${r.text}`).join('\n\n')}\n`;return`\n${m.emoji||''} ${m.title||''}:\n${m.text}\n`}).join('\n---\n');
  const b=new Blob([`${p.name} — ${t?.name||''}\n${'='.repeat(50)}\nКонтекст: ${p.context||'—'}\n${'='.repeat(50)}\n${txt}`],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`boardroom_${p.id}_${S.curTeam}_${new Date().toISOString().slice(0,10)}.txt`;a.click()
}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendQuestion()}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,180)+'px';document.getElementById('sendBtn').disabled=!el.value.trim()}
renderSB();if(!S.apiKey)setTimeout(showSettingsModal,500);
</script>
